<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登入 - {{APP_TITLE}}</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>

<body class="login-page">
    <div class="card">
        <h2>{{APP_TITLE}}</h2>
        <div id="error-msg" class="error-msg"></div>
        <form method="POST" action="/login" autocomplete="off">
            <label for="username">帳號</label>
            <input type="text" id="username" name="username" autocomplete="username" autofocus required />
            <label for="code">驗證碼 (TOTP)</label>
            <input type="text" id="code" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
                placeholder="000000" required />
            <button type="submit">登入</button>
        </form>
    </div>
    <script>
        (function () {
            var reason = new URLSearchParams(location.search).get('reason');
            if (!reason) return;
            var msg;
            switch (reason) {
                case 'blocked':           msg = '嘗試次數過多，請稍後再試'; break;
                case 'invalid':           msg = '驗證失敗，請確認帳號與驗證碼是否正確'; break;
                case 'expired':           msg = '登入已逾時，請重新登入'; break;
                case 'kick':              msg = '您已被管理員強制登出'; break;
                case 'duplicate_connect': msg = '偵測到重複登入，已自動登出'; break;
                default:                  msg = '已登出';
            }
            var el = document.getElementById('error-msg');
            el.style.display = 'block';
            el.textContent = msg;
        })();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>登入 - HTML Editor</title>
<style>
  :root {
    --bg: #1e1e1e;
    --bg-card: #252526;
    --fg: #cccccc;
    --fg-dim: #858585;
    --border: #3c3c3c;
    --accent: #007acc;
    --danger: #c84040;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
    font-size: 14px;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 32px 36px 28px;
    width: 320px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  h2 {
    font-size: 16px;
    font-weight: 600;
    color: var(--fg);
    margin-bottom: 24px;
    text-align: center;
    letter-spacing: 0.3px;
  }
  .error-msg {
    background: rgba(200,64,64,0.15);
    border: 1px solid var(--danger);
    color: #f48771;
    border-radius: 4px;
    padding: 8px 12px;
    font-size: 12px;
    margin-bottom: 18px;
    display: none;
  }
  label {
    display: block;
    font-size: 11px;
    color: var(--fg-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  input[type="text"], input[type="password"] {
    display: block;
    width: 100%;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px 10px;
    font-size: 13px;
    outline: none;
    margin-bottom: 18px;
    transition: border-color 0.15s;
    text-align: center;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    border-color: var(--accent);
  }
  input[inputmode="numeric"] {
    letter-spacing: 4px;
    font-size: 18px;
    text-align: center;
  }
  button[type="submit"] {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 3px;
    padding: 9px;
    font-size: 13px;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.15s;
  }
  button[type="submit"]:hover { background: #1180d4; }
  button[type="submit"]:active { background: #0e6eb8; }
</style>
</head>
<body>
<div class="card">
  <h2>HTML Editor</h2>
  <div id="error-msg" class="error-msg"></div>
  <form method="POST" action="/login" autocomplete="off">
    <label for="username">帳號</label>
    <input type="text" id="username" name="username" autocomplete="username" autofocus required />
    <label for="code">驗證碼 (TOTP)</label>
    <input type="text" id="code" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000" required />
    <button type="submit">登入</button>
  </form>
</div>
<script>
(function () {
  var p = new URLSearchParams(location.search);
  if (p.has('error')) {
    var el = document.getElementById('error-msg');
    el.style.display = 'block';
    el.textContent = p.get('error') === 'blocked'
      ? '嘗試次數過多，請稍後再試'
      : '驗證失敗，請確認帳號與驗證碼是否正確';
  }
})();
</script>
</body>
</html>
